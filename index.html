<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie|Counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-600 p-6 min-h-screen flex items-center justify-center">

    <div class="max-w-md mx-auto bg-green-100 p-6 rounded shadow">
        <h1 class="text-2xl font-bold uppercase mb-4">Calorie Counter</h1>
        
        <form id="calorie-form" class="mb-4">
            <input type="text" id="food-name" placeholder="Food Name" class="border p-2 w-full mb-2" required>
            <input type="number" id="calories" placeholder="Calories" class="border p-2 w-full mb-2" required>
            <button type="submit" class="bg-green-900 text-white p-2 w-full rounded-md font-bold">Add Item</button>
        </form>

        <ul id="food-list" class="mb-4"></ul>

        <div class="text-xl font-bold mb-4">Total: <span id="total-calories">0</span></div>
        
        <button id="reset-btn" class="bg-white text-green p-2 w-full rounded-md font-bold">Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
